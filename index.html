<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ansonia Vault v15</title>
    <style>
        :root { --accent: #722f37; --bg: #fdfaf6; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); padding: 20px; padding-bottom: 120px; margin: 0; max-width: 600px; margin: auto; }
        header { text-align: center; margin-bottom: 20px; }
        .version-tag { font-size: 10px; color: #bbb; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .search-bar { width: 100%; padding: 14px; border-radius: 25px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; outline: none; }
        .search-bar:focus { border-color: var(--accent); }
        .btn-refresh { background: #fff; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 20px; font-size: 0.85em; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .wine-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); border-top: 6px solid var(--accent); }
        .wine-name { font-weight: bold; display: block; font-size: 1.2em; color: #1a1a1a; margin-bottom: 4px; }
        .db-link { display: inline-block; color: #0066cc; font-size: 0.9em; text-decoration: none; margin-bottom: 15px; }
        .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-toggle { flex: 1; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fafafa; cursor: pointer; font-size: 1em; -webkit-tap-highlight-color: transparent; }
        .active-like { background-color: #2e7d32 !important; color: white !important; font-weight: bold; }
        .active-maybe { background-color: #f9a825 !important; color: white !important; font-weight: bold; }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 10px; padding: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; background: #fff; min-height: 100px; resize: none; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); }
        .btn-email { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 1.1em; cursor: pointer; max-width: 560px; display: block; margin: auto; }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--accent); margin:0;">Ansonia Vault</h1>
    <div class="version-tag">System v15.0 • <span id="timestamp"></span></div>
    <div style="margin-top: 15px;">
        <input type="text" id="search" oninput="render()" class="search-bar" placeholder="🔍 Search current wines...">
        <button class="btn-refresh" onclick="manualRefresh()">🔄 Fetch latest wine list & Reset Notes</button>
    </div>
</header>

<div id="container"></div>

<div class="footer">
    <button class="btn-email" onclick="sendEmail()">📧 Email My Tasting Report</button>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbHkzVoSers1cLk05REXLT1sbvDzxRFhX5Ohi5Cu28UHWv6goTzLh31O-T6eqB9_x6aKUv25znz32g/pub?gid=1817461502&single=true&output=csv';
    const KEY = 'ansonia_v15_final'; 
    
    let wineList = [];
    let state = JSON.parse(localStorage.getItem(KEY)) || {};

    async function load() {
        try {
            const res = await fetch(SHEET_URL + '&cb=' + Date.now());
            const text = await res.text();
            const rows = text.split(/\r?\n/).slice(1);
            
            wineList = rows.map((r, i) => {
                const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    id: "w_" + i,
                    name: cols[0] ? cols[0].replace(/"/g, '').trim() : "",
                    link: cols[1] ? cols[1].replace(/"/g, '').trim() : ""
                };
            }).filter(w => w.name);

            document.getElementById('timestamp').innerText = "Loaded: " + new Date().toLocaleTimeString();
            render();
        } catch (e) { console.error("Sync failed", e); }
    }

    function render() {
        const term = document.getElementById('search').value.toLowerCase();
        const container = document.getElementById('container');
        let html = '';
        
        wineList.forEach(wine => {
            if (!wine.name.toLowerCase().includes(term)) return;
            const s = state[wine.id] || { s: null, n: "" };
            
            html += `
                <div class="wine-card">
                    <span class="wine-name">${wine.name}</span>
                    ${wine.link ? `<a href="${wine.link}" target="_blank" class="db-link">Details & Reorder →</a>` : ''}
                    
                    <div class="toggle-group">
                        <button class="btn-toggle ${s.s === 'L' ? 'active-like' : ''}" onclick="saveChoice('${wine.id}','L')">👍 Like</button>
                        <button class="btn-toggle ${s.s === 'M' ? 'active-maybe' : ''}" onclick="saveChoice('${wine.id}','M')">🤔 Maybe</button>
                    </div>

                    <textarea oninput="saveNote('${wine.id}', this.value)" placeholder="My private tasting notes...">${s.n}</textarea>
                </div>`;
        });
        container.innerHTML = html;
    }

    window.manualRefresh = async function() {
        localStorage.removeItem(KEY);
        state = {};
        await load();
        window.scrollTo(0,0);
        alert("Success! The list has been updated and your notes have been reset for the new tasting.");
    }

    window.saveChoice = function(id, val) {
        if(!state[id]) state[id] = { s: null, n: "" };
        state[id].s = (state[id].s === val) ? null : val;
        localStorage.setItem(KEY, JSON.stringify(state));
        render();
    };

    window.saveNote = function(id, txt) {
        if(!state[id]) state[id] = { s: null, n: "" };
        state[id].n = txt;
        localStorage.setItem(KEY, JSON.stringify(state));
    };

    window.sendEmail = function() {
        let body = "ANSONIA WINE VAULT: TASTING REPORT%0D%0A";
        body += "------------------------------------------%0D%0A%0D%0A";
        let count = 0;
        
        wineList.forEach(wine => {
            const d = state[wine.id];
            if(d && (d.s || d.n)) {
                count++;
                const rating = d.s === 'L' ? "👍 LIKED IT" : (d.s === 'M' ? "🤔 MAYBE" : "RATED: NONE");
                body += `🍷 WINE: ${wine.name.toUpperCase()}%0D%0A`;
                body += `RANK: ${rating}%0D%0A`;
                body += `NOTES: ${d.n || 'No notes.'}%0D%0A`;
                if(wine.link) body += `LINK: ${wine.link}%0D%0A`;
                body += "------------------------------------------%0D%0A%0D%0A";
            }
        });

        if(count === 0) {
            alert("No notes to send! Rate a few wines first.");
        } else {
            // Updated desktop-friendly mailto handling
            const mailtoUrl = `mailto:?subject=My Ansonia Tasting Report&body=${body}`;
            window.open(mailtoUrl, '_self'); 
        }
    };

    load();
</script>
</body>
</html>
