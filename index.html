<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ansonia Vault v6</title>
    <style>
        :root { --accent: #722f37; --bg: #fdfaf6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; padding-bottom: 100px; margin: 0; }
        .wine-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); }
        .btn-toggle { flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; }
        
        /* Using !important to force the color regardless of browser bugs */
        .active-like { background-color: #2e7d32 !important; color: white !important; }
        .active-maybe { background-color: #f9a825 !important; color: white !important; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; z-index: 1000; }
        .btn-email { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<header style="text-align:center; margin-bottom:20px;">
    <h1 style="color:var(--accent); margin:0;">Ansonia Vault</h1>
    <div id="ver" style="font-size:10px; color:#ccc;">Version 6.0 - Loaded: <span id="ts"></span></div>
</header>

<div id="container"></div>

<div class="footer">
    <button class="btn-email" onclick="sendEmail()">📧 Email My Selections</button>
</div>

<script>
    document.getElementById('ts').innerText = new Date().toLocaleTimeString();
    
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbHkzVoSers1cLk05REXLT1sbvDzxRFhX5Ohi5Cu28UHWv6goTzLh31O-T6eqB9_x6aKUv25znz32g/pub?gid=1817461502&single=true&output=csv';
    const KEY = 'ansonia_v6_stable';
    
    let wineData = [];
    let state = JSON.parse(localStorage.getItem(KEY)) || {};

    async function load() {
        const res = await fetch(SHEET_URL + '&cachebust=' + Date.now());
        const text = await res.text();
        wineData = text.split(/\r?\n/).slice(1)
            .map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)[0].replace(/"/g, '').trim())
            .filter(n => n);
        render();
    }

    function render() {
        let html = '';
        wineData.forEach(name => {
            const s = state[name] || { s: null, n: "" };
            html += `
                <div class="wine-card">
                    <b style="display:block;margin-bottom:10px;">${name}</b>
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <button class="btn-toggle ${s.s === 'L' ? 'active-like' : ''}" onclick="save('${name}','L')">👍 Like</button>
                        <button class="btn-toggle ${s.s === 'M' ? 'active-maybe' : ''}" onclick="save('${name}','M')">🤔 Maybe</button>
                    </div>
                    <textarea style="width:100%; box-sizing:border-box;" oninput="saveNote('${name}',this.value)" placeholder="Notes...">${s.n}</textarea>
                </div>`;
        });
        document.getElementById('container').innerHTML = html;
    }

    window.save = function(name, val) {
        if(!state[name]) state[name] = { s: null, n: "" };
        state[name].s = (state[name].s === val) ? null : val;
        localStorage.setItem(KEY, JSON.stringify(state));
        render(); // Re-render to lock the color
    };

    window.saveNote = function(name, txt) {
        if(!state[name]) state[name] = { s: null, n: "" };
        state[name].n = txt;
        localStorage.setItem(KEY, JSON.stringify(state));
    };

    window.sendEmail = function() {
        let b = "MY NOTES:%0D%0A%0D%0A";
        Object.entries(state).forEach(([n, d]) => {
            if(d.s || d.n) b += `${n}: ${d.s||'None'} - ${d.n}%0D%0A%0D%0A`;
        });
        window.location.href = `mailto:?subject=Wine Notes&body=${b}`;
    };

    load();
</script>
</body>
</html>
